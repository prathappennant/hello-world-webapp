<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World Web App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 4rem 1rem;
        background: #f7f9fc;
        color: #0f172a;
      }
      .card {
        display: inline-block;
        padding: 2rem;
        border-radius: 16px;
        background: white;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        max-width: 540px;
        width: 100%;
      }
      h1 {
        margin-bottom: 1rem;
        color: #111827;
      }
      pre {
        white-space: pre-wrap;
        text-align: left;
        font-size: 1rem;
        color: #334155;
      }
      .message {
        margin-top: 1.5rem;
        padding: 1rem;
        border-radius: 12px;
        background: #eef2ff;
        color: #3730a3;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello World from Prathap</h1>
      <p>This is a simple JavaScript Hello World page served from Azure.</p>
      <div class="message" id="message">Loading...</div>
      <pre><code>Edit <strong>index.html</strong> and push to GitHub to update this page.</code></pre>
    </div>

    <script>
      document.getElementById('message').textContent = 'Hello World from Azure!';
    </script>
  </body>
</html>
